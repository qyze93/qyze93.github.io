<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bağlantı Testi</title>
    <style>
        body { 
            background: white; color: black; text-align: center; font-family: sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #status { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; z-index: 5; padding: 0 15px; }
        
        .btn {
            background: red; color: white; border: none;
            width: 90px; height: 90px; border-radius: 50%;
            font-weight: bold; font-size: 1rem;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            cursor: pointer; z-index: 10; transition: none;
        }

        .scary { background: #1a0000 !important; color: red !important; }
        .scaryBtn { 
            background: #600 !important; border: 2px solid red !important; 
            box-shadow: 0 0 20px red;
        }

        #finalGoril {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; object-fit: contain; 
            background: black; z-index: 100;
        }
        #kandirildin {
            display: none; position: fixed; top: 30px; width: 100%;
            color: red; font-size: 2rem; font-weight: bold; z-index: 110;
            text-shadow: 2px 2px 5px black; text-align: center;
        }
    </style>
</head>
<body>

    <div id="status">BUTONA BAS</div>
    <button id="runBtn" class="btn">BAS</button>
    
    <div id="kandirildin">HAHA KANDIRILDIN</div>
    <img id="finalGoril" src="https://i.ibb.co/vz6mD8Y/angry-gorilla.jpg">

    <script>
        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const goril = document.getElementById('finalGoril');
        const txt = document.getElementById('kandirildin');
        const body = document.body;
        
        let count = 0;
        let running = false;
        let loop;

        function move() {
            btn.style.top = (Math.random() * 70 + 15) + "%";
            btn.style.left = (Math.random() * 70 + 15) + "%";
        }

        const handle = (e) => {
            e.preventDefault();
            count++;

            if (running) {
                clearInterval(loop);
                running = false;
                body.classList.remove('scary');
                status.innerText = "BAŞARDIN İŞTE ÖDÜLÜN İÇİN SON KEZ BAS";
                status.style.color = "black";
                btn.classList.remove('scaryBtn');
                btn.style.top = "50%"; btn.style.left = "50%";
                btn.innerText = "SON BAS";
                return;
            }

            if (count === 1) {
                move();
                status.innerText = "-SADECE BUKADARMI DOSTUM?-";
            } else if (count === 2) {
                move();
                status.innerText = "-HAHA ÇOK SAKARSIN-";
            } else if (count === 3) {
                body.classList.add('scary');
                status.innerText = "-BU BİR HATAYDI-";
                btn.classList.add('scaryBtn');
                btn.innerText = "YAKALA";
                running = true;
                loop = setInterval(move, 130);
            } else if (count === 4) {
                goril.style.display = "block";
                txt.style.display = "block";
                btn.style.display = "none";
                status.style.display = "none";
            }
        };

        btn.addEventListener('touchstart', handle);
        btn.addEventListener('click', handle);
    </script>
</body>
</html>

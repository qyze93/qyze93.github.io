<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sakın Basma</title>
    <style>
        body { 
            background: white; color: black; text-align: center; font-family: sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: block;
        }
        
        /* YAZILARI EN TEPEYE SABİTLEDİK */
        #status { 
            position: fixed; top: 40px; left: 0; width: 100%;
            font-size: 1.4rem; font-weight: bold; z-index: 50; 
            padding: 0 10px; box-sizing: border-box;
            text-transform: uppercase;
        }
        
        .btn { 
            background: red; color: white; border: none; 
            width: 95px; height: 95px; border-radius: 50%; 
            font-weight: bold; font-size: 1.1rem; 
            position: absolute; top: 60%; left: 50%; 
            transform: translate(-50%, -50%); 
            cursor: pointer; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .scary { background: #1a0000 !important; color: #ff0000 !important; }
        .scaryBtn { background: #800 !important; border: 3px solid red !important; box-shadow: 0 0 25px red; }
        
        #finalGoril { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; object-fit: contain; 
            background: black; z-index: 100; 
        }
        
        #kandirildin { 
            display: none; position: fixed; top: 20px; width: 100%; 
            color: red; font-size: 2.2rem; font-weight: bold; 
            z-index: 110; text-shadow: 3px 3px 6px black; text-align: center;
        }
    </style>
</head>
<body id="mainBody">

    <div id="status">BUTONA BAS DOSTUM</div>
    <button id="runBtn" class="btn">BAS</button>
    
    <div id="kandirildin">KANDIRILDIN!</div>
    <img id="finalGoril" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJmZ2E1bmR4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZ2VudCZjdD1n/H7Z5EupNPDZXZXGz2u/giphy.gif">

    <script>
        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const goril = document.getElementById('finalGoril');
        const txt = document.getElementById('kandirildin');
        const body = document.getElementById('mainBody');
        
        let count = 0; let running = false; let loop;

        function move() { 
            // Yazıların (top: 40px) altında kalmaması için alanı kısıtladık
            let newTop = Math.random() * 65 + 25; // %25 ile %90 arası
            let newLeft = Math.random() * 70 + 15; // %15 ile %85 arası
            btn.style.top = newTop + "%"; 
            btn.style.left = newLeft + "%"; 
        }

        const handle = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            count++;

            if (running) { 
                clearInterval(loop); running = false; 
                body.classList.remove('scary'); 
                status.innerText = "HELAL OLSUN! ÖDÜLÜNÜ ALMAK İÇİN SON KEZ TIKLA"; 
                status.style.color = "black"; 
                btn.classList.remove('scaryBtn'); 
                btn.style.top = "60%"; btn.style.left = "50%"; 
                btn.innerText = "TIKLA"; 
                return; 
            }

            if (count === 1) { 
                move(); 
                status.innerText = "Yavaşsın... Biraz hızlan!"; 
            } else if (count === 2) { 
                move(); 
                status.innerText = "Yaklaşamadın bile 😂"; 
            } else if (count === 3) { 
                body.classList.add('scary'); 
                status.innerText = "SİNİRLENİYORUM!!!"; 
                btn.classList.add('scaryBtn'); 
                btn.innerText = "YAKALA"; 
                running = true; 
                loop = setInterval(move, 135); 
            } else if (count === 4) { 
                goril.style.display = "block"; 
                txt.style.display = "block"; 
                btn.style.display = "none"; 
                status.style.display = "none"; 
            }
        };

        btn.addEventListener('touchstart', handle);
        btn.addEventListener('click', handle);
    </script>
</body>
</html>

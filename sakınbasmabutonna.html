<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sakin Basma</title>
    <style>
        body { background: white; color: black; text-align: center; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; display: block; }
        #status { position: fixed; top: 40px; left: 0; width: 100%; font-size: 1.3rem; font-weight: bold; z-index: 50; padding: 0 10px; }
        .btn { background: red; color: white; border: none; width: 95px; height: 95px; border-radius: 50%; font-weight: bold; font-size: 1rem; position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; touch-action: none; transition: 0.1s; }
        .scary { background: #1a0000 !important; color: red !important; }
        .scaryBtn { background: #600 !important; border: 2px solid red !important; box-shadow: 0 0 20px red; }
        #finalPic { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; background: black; z-index: 100; }
        #kandirildin { display: none; position: fixed; top: 20px; width: 100%; color: red; font-size: 2rem; font-weight: bold; z-index: 110; text-shadow: 2px 2px 5px black; text-align: center; }
    </style>
</head>
<body id="mainBody">

    <div id="status">BUTONA BAS</div>
    <button id="runBtn" class="btn">BAS</button>
    <div id="kandirildin">HAHA KANDIRILDIN</div>
    
    <img id="finalPic" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJmZ2E1bmR4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4Zmt4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZ2VudCZjdD1n/H7Z5EupNPDZXZXGz2u/giphy.gif">

    <script>
        const btn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const pic = document.getElementById('finalPic');
        const txt = document.getElementById('kandirildin');
        const body = document.getElementById('mainBody');
        let count = 0; let running = false; let loop;

        function move() { 
            let newTop = Math.random() * 65 + 25; 
            let newLeft = Math.random() * 70 + 15; 
            btn.style.top = newTop + "%"; 
            btn.style.left = newLeft + "%"; 
        }

        const handle = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            count++;

            if (running) { 
                clearInterval(loop); 
                running = false; 
                body.classList.remove('scary'); 
                status.innerText = "BAŞARDIN İŞTE ÖDÜLÜN İÇİN SON KEZ BAS"; 
                status.style.color = "black"; 
                btn.classList.remove('scaryBtn'); 
                btn.style.top = "60%"; btn.style.left = "50%"; 
                btn.innerText = "SON BAS"; 
                return; 
            }

            if (count === 1) { 
                move(); 
                status.innerText = "-SADECE BUKADARMI DOSTUM?-"; 
            } else if (count === 2) { 
                move(); 
                status.innerText = "-HAHA ÇOK SAKARSIN-"; 
            } else if (count === 3) { 
                body.classList.add('scary'); 
                status.innerText = "-BU BİR HATAYDI-"; 
                btn.classList.add('scaryBtn'); 
                btn.innerText = "YAKALA"; 
                running = true; 
                loop = setInterval(move, 120); 
            } else if (count === 4) { 
                // BURASI KRİTİK: Resmi görünür yapıyoruz
                pic.style.display = "block"; 
                txt.style.display = "block"; 
                btn.style.display = "none"; 
                status.style.display = "none"; 
                // Eğer GIF yüklenmezse diye arka planı siyah yapıyoruz
                body.style.background = "black";
            }
        };

        btn.addEventListener('touchstart', handle);
        btn.addEventListener('click', handle);
    </script>
</body>
</html>

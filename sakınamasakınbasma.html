    <title>Sakin Bas Dostum...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }
        #main-container {
            transition: all 0.3s;
        }
        .btn {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px #ff6b81;
            outline: none;
        }
        .btn:active {
            box-shadow: 0 5px #ff6b81;
            transform: translateY(5px);
        }
        #text-box {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: bold;
            min-height: 40px;
        }
        /* Final Ekranı */
        #final-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 9999;
            overflow: hidden;
            word-wrap: break-word;
        }
        #kandirildin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: red;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border: 5px solid red;
            z-index: 10000;
            width: 80%;
            text-shadow: 0 0 20px black;
        }
        .emoji-bg {
            font-size: 40px;
            opacity: 0.8;
            display: inline-block;
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>

</div>
